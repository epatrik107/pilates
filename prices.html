<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Balance Studio árlista – Mat, Reformer és Tower pilates órák árai. Bérletek és alkalmi jegyek." />
  <meta property="og:title" content="Árlista – Balance Studio" />
  <meta property="og:description" content="Balance Studio árlista – Mat, Reformer és Tower pilates órák árai." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="hu_HU" />
  <meta property="og:site_name" content="Balance Studio" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Árlista – Balance Studio" />
  <meta name="twitter:description" content="Balance Studio árlista – Mat, Reformer és Tower pilates órák árai." />
  <title>Árlista – Balance Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6b8a53" />
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
</head>
<body>

  <nav class="navbar navbar-expand-md border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.svg" alt="Balance Studio" height="42">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul id="nav-links" class="navbar-nav me-auto mb-2 mb-md-0"></ul>
        <ul id="nav-right" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <section class="hero-gradient py-5 py-md-5">
    <div class="container text-center py-4">
      <h1 class="display-5 fw-bold mb-3" style="color: var(--sage-800);">Árlista</h1>
      <p class="lead mb-0 text-sage">Bérletek, alkalmi jegyek és csomagárak</p>
    </div>
  </section>

  <main class="container py-4 py-md-5">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-10">
        <div id="pricing-container">
          <div class="d-flex justify-content-center py-5">
            <div class="spinner-border spinner-sage" role="status" style="width:2.5rem;height:2.5rem;border-width:3px">
              <span class="visually-hidden">Betöltés...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-top py-4 mt-5">
    <div class="container text-center text-muted small">
      &copy; 2026 Balance Studio. Minden jog fenntartva.
      &middot; <a href="privacy.html" class="text-sage text-decoration-none">Adatvédelem</a>
      &middot; <a href="terms.html" class="text-sage text-decoration-none">ÁSZF</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initNavbar, escapeHtml } from './js/ui.js';
    import { getPricing } from './js/classes.js';
    initNavbar();

    const container = document.getElementById('pricing-container');

    try {
      const items = await getPricing();

      if (!items.length) {
        container.innerHTML = `
          <div class="text-center text-muted py-5">
            <svg class="mb-3 opacity-50" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z" />
            </svg>
            <p class="fw-medium mb-1">Az árlista hamarosan elérhető!</p>
            <p class="small">Kérjük, nézz vissza később.</p>
          </div>`;
      } else {
        let html = '<div class="row g-4">';
        for (const item of items) {
          html += `
            <div class="col-12 col-sm-6 col-lg-4">
              <div class="card border shadow-sm h-100 overflow-hidden">
                <div class="card-body p-4 d-flex flex-column">
                  <h3 class="h5 fw-semibold mb-2" style="color:var(--sage-800)">${escapeHtml(item.title)}</h3>
                  ${item.description ? `<p class="text-muted small flex-grow-1 mb-3">${escapeHtml(item.description)}</p>` : '<div class="flex-grow-1"></div>'}
                  <div class="d-flex align-items-baseline gap-1 mt-auto">
                    <span class="h3 fw-bold mb-0" style="color:var(--sage-700)">${escapeHtml(item.price)}</span>
                    ${item.unit ? `<span class="text-muted small">/ ${escapeHtml(item.unit)}</span>` : ''}
                  </div>
                </div>
                ${item.highlighted ? '<div style="height:4px;background:var(--sage-500)"></div>' : ''}
              </div>
            </div>`;
        }
        html += '</div>';
        container.innerHTML = html;
      }

    } catch (err) {
      container.innerHTML = `<div class="text-center py-5 text-danger"><p class="fw-medium">Hiba az árlista betöltése során</p><p class="small">${escapeHtml(err.message)}</p></div>`;
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
