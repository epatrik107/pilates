<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilom – Pilates Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <nav class="navbar navbar-expand-md border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <svg class="text-sage" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 2.69-9 6s4.03 6 9 6 9-2.69 9-6-4.03-6-9-6zM3 12v3c0 3.31 4.03 6 9 6s9-2.69 9-6v-3" />
        </svg>
        Pilates Studio
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul id="nav-links" class="navbar-nav me-auto mb-2 mb-md-0"></ul>
        <ul id="nav-right" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 800px;">

    <div id="profile-header" class="card border shadow-sm p-4 mb-4">
      <div class="d-flex align-items-center gap-3">
        <div id="avatar" class="avatar-circle">
          ?
        </div>
        <div>
          <h1 id="user-name" class="h3 font-display fw-bold mb-1" style="color: var(--sage-800);">Betöltés...</h1>
          <p id="user-email" class="small text-muted mb-1"></p>
          <span id="user-role" class="mt-1"></span>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <h2 class="h5 font-display fw-semibold d-flex align-items-center gap-2 mb-0" style="color: var(--sage-800);">
        <svg class="text-sage flex-shrink-0" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
        </svg>
        Közelgő foglalásaim
      </h2>
    </div>

    <div id="bookings-container">
    </div>
  </main>

  <footer class="border-top py-4 mt-5">
    <div class="container text-center small text-muted">
      &copy; 2026 Pilates Studio. Minden jog fenntartva.
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initNavbar, requireAuth, showToast, showLoading, showConfirm, formatDate, escapeHtml } from './js/ui.js';
    import { getUserProfile } from './js/auth.js';
    import { googleCalendarConfig } from './js/firebase-config.js';
    import { getUserBookings, cancelBooking, saveCalendarEventId } from './js/bookings.js';
    import {
      generateGoogleCalendarUrl,
      initGoogleCalendarAPI,
      isGoogleCalendarAPIConfigured,
      addEventToGoogleCalendar
    } from './js/google-calendar.js';

    initNavbar();

    // Google Calendar API initialization
    if (googleCalendarConfig.clientId && googleCalendarConfig.apiKey) {
      initGoogleCalendarAPI(googleCalendarConfig.clientId, googleCalendarConfig.apiKey).catch(() => {});
    }

    requireAuth(async (user) => {
      const profile = await getUserProfile(user.uid);

      const name  = profile?.name || user.displayName || 'Felhasználó';
      const email = user.email;
      const role  = profile?.role || 'user';

      document.getElementById('user-name').textContent  = name;
      document.getElementById('user-email').textContent = email;
      document.getElementById('avatar').textContent     = name.charAt(0).toUpperCase();

      const roleEl = document.getElementById('user-role');
      if (role === 'admin') {
        roleEl.textContent = 'Edző / Admin';
        roleEl.className   = 'badge badge-sage mt-1';
      } else {
        roleEl.textContent = 'Tag';
        roleEl.className   = 'badge bg-primary-subtle text-primary mt-1';
      }

      loadBookings(user.uid);
    });

    async function loadBookings(userId) {
      const container = document.getElementById('bookings-container');
      showLoading(container);

      try {
        const bookings = await getUserBookings(userId);
        renderBookings(bookings, container);
      } catch (err) {
        container.innerHTML = `
          <div class="text-center py-5 text-danger">
            <p class="fw-medium mb-1">Hiba a foglalások betöltése során</p>
            <p class="small mb-0">${escapeHtml(err.message)}</p>
          </div>`;
      }
    }

    function renderBookings(bookings, container) {
      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5 px-3">
            <svg class="text-muted mb-3 opacity-50" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
            <p class="text-muted fw-medium mb-1">Nincs közelgő foglalásod</p>
            <p class="small text-muted mb-0">
              Nézd meg az <a href="index.html" class="text-sage">órarendet</a> és foglalj helyet!
            </p>
          </div>`;
        return;
      }

      const calIcon = `<svg class="flex-shrink-0" style="width:1rem;height:1rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
      </svg>`;

      container.innerHTML = `
        <div>
          ${bookings.map((b) => {
            const gcalUrl = generateGoogleCalendarUrl({
              title: b.classTitle,
              date: b.classDate,
              startTime: b.classStartTime,
              duration: b.classDuration || 60,
              location: b.classLocation || 'Pilates Studio',
              instructorName: b.instructorName || '',
              description: b.classDescription || '',
            });
            const hasCalEvent = !!b.calendarEventId;

            return `
            <div class="card border p-3 mb-2 animate-fade-in-up">
              <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-3">
                <div class="flex-grow-1">
                <h3 class="fw-semibold mb-1 mb-sm-0">${escapeHtml(b.classTitle)}</h3>
                <p class="small text-muted mb-0">
                  ${formatDate(b.classDate)} &middot; ${escapeHtml(b.classStartTime)}
                    ${b.classLocation ? ` &middot; ${escapeHtml(b.classLocation)}` : ''}
                  </p>
                  ${hasCalEvent ? '<p class="small text-success mt-1 mb-0 d-flex align-items-center gap-1">' + calIcon + ' Szinkronizálva a Google Naptárral</p>' : ''}
                </div>
                <div class="d-flex align-items-center gap-2 flex-shrink-0 align-self-start">
                  ${!hasCalEvent
                    ? isGoogleCalendarAPIConfigured()
                      ? `<button type="button" class="gcal-sync-btn btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1"
                                 data-booking-id="${b.id}"
                                 data-class-title="${b.classTitle}"
                                 data-class-date="${b.classDate}"
                                 data-class-time="${b.classStartTime}"
                                 data-class-duration="${b.classDuration || 60}"
                                 data-class-location="${b.classLocation || ''}"
                                 data-instructor="${b.instructorName || ''}"
                                 data-description="${b.classDescription || ''}"
                                 title="Szinkronizálás a Google Naptárral">
                          ${calIcon} Naptár
                        </button>`
                      : `<a href="${gcalUrl}" target="_blank" rel="noopener"
                            class="btn btn-sm btn-outline-primary d-inline-flex align-items-center gap-1"
                            title="Hozzáadás a Google Naptárhoz">
                          ${calIcon} Naptár
                        </a>`
                    : ''
                  }
                  <button type="button" class="cancel-booking-btn btn btn-sm btn-outline-secondary d-inline-flex align-items-center gap-1"
                          data-booking-id="${b.id}" data-class-id="${b.classId}">
                    <svg class="flex-shrink-0" style="width:1rem;height:1rem" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    Lemondás
                  </button>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      `;

      // Google Calendar API sync buttons
      container.querySelectorAll('.gcal-sync-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Szinkron...';

          try {
            const classData = {
              title: btn.dataset.classTitle,
              date: btn.dataset.classDate,
              startTime: btn.dataset.classTime,
              duration: parseInt(btn.dataset.classDuration) || 60,
              location: btn.dataset.classLocation,
              instructorName: btn.dataset.instructor,
              description: btn.dataset.description,
            };
            const eventId = await addEventToGoogleCalendar(classData);
            await saveCalendarEventId(btn.dataset.bookingId, eventId);
            showToast('Esemény hozzáadva a Google Naptárhoz!', 'success');

            const user = (await import('./js/firebase-config.js')).auth.currentUser;
            loadBookings(user.uid);
          } catch (err) {
            showToast('Naptár szinkron hiba: ' + err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = `${calIcon} Naptár`;
          }
        });
      });

      // Cancel buttons
      container.querySelectorAll('.cancel-booking-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await showConfirm('Biztosan le szeretnéd mondani ezt a foglalást?');
          if (!ok) return;

          btn.disabled = true;
          btn.textContent = 'Lemondás...';

          try {
            await cancelBooking(btn.dataset.bookingId, btn.dataset.classId);
            showToast('Foglalás sikeresen lemondva.', 'info');
            const user = (await import('./js/firebase-config.js')).auth.currentUser;
            loadBookings(user.uid);
          } catch (err) {
            showToast('Hiba a lemondás során: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Lemondás';
          }
        });
      });
    }
  </script>
</body>
</html>
