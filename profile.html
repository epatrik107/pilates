<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profilom – Pilates Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50:'#f4f7f0',100:'#e6edde',200:'#cddabd',300:'#a9bf93',400:'#87a46e',500:'#6b8a53',600:'#536d3f',700:'#425634',800:'#37462d',900:'#2f3b27' },
            cream: '#faf8f4'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Google Calendar API (optional – if configured) -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav id="navbar" class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <svg class="w-8 h-8 text-sage-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 2.69-9 6s4.03 6 9 6 9-2.69 9-6-4.03-6-9-6zM3 12v3c0 3.31 4.03 6 9 6s9-2.69 9-6v-3" />
          </svg>
          <span class="font-display text-xl font-bold text-sage-700">Pilates Studio</span>
        </a>
        <div id="desktop-nav" class="hidden md:flex items-center gap-1"></div>
        <button id="menu-toggle" class="md:hidden p-2 rounded-lg hover:bg-gray-100">
          <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
      <div id="mobile-menu" class="hidden md:hidden pb-4">
        <div id="mobile-nav" class="flex flex-col gap-1"></div>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-8">

    <!-- Profile header -->
    <div id="profile-header" class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 mb-8">
      <div class="flex items-center gap-4">
        <div id="avatar" class="w-16 h-16 rounded-full bg-sage-200 text-sage-700 flex items-center justify-center text-2xl font-display font-bold">
          ?
        </div>
        <div>
          <h1 id="user-name" class="text-2xl font-display font-bold text-sage-800">Betöltés...</h1>
          <p id="user-email" class="text-gray-500 text-sm"></p>
          <span id="user-role" class="badge badge-default mt-1"></span>
        </div>
      </div>
    </div>

    <!-- Bookings -->
    <div class="mb-6">
      <h2 class="text-xl font-display font-semibold text-sage-800 mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-sage-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
        </svg>
        Közelgő foglalásaim
      </h2>
    </div>

    <div id="bookings-container">
      <!-- Loading... -->
    </div>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="border-t border-gray-100 py-8 mt-10">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-sm text-gray-400">
      &copy; 2026 Pilates Studio. Minden jog fenntartva.
    </div>
  </footer>

  <script type="module">
    import { initNavbar, requireAuth, showToast, showLoading, showConfirm, formatDate, escapeHtml } from './js/ui.js';
    import { getUserProfile } from './js/auth.js';
    import { googleCalendarConfig } from './js/firebase-config.js';
    import { getUserBookings, cancelBooking, saveCalendarEventId } from './js/bookings.js';
    import {
      generateGoogleCalendarUrl,
      initGoogleCalendarAPI,
      isGoogleCalendarAPIConfigured,
      addEventToGoogleCalendar
    } from './js/google-calendar.js';

    initNavbar();

    // Google Calendar API initialization
    if (googleCalendarConfig.clientId && googleCalendarConfig.apiKey) {
      initGoogleCalendarAPI(googleCalendarConfig.clientId, googleCalendarConfig.apiKey).catch(() => {});
    }

    requireAuth(async (user) => {
      const profile = await getUserProfile(user.uid);

      const name  = profile?.name || user.displayName || 'Felhasználó';
      const email = user.email;
      const role  = profile?.role || 'user';

      document.getElementById('user-name').textContent  = name;
      document.getElementById('user-email').textContent = email;
      document.getElementById('avatar').textContent     = name.charAt(0).toUpperCase();

      const roleEl = document.getElementById('user-role');
      if (role === 'admin') {
        roleEl.textContent = 'Edző / Admin';
        roleEl.className   = 'badge bg-sage-100 text-sage-700';
      } else {
        roleEl.textContent = 'Tag';
        roleEl.className   = 'badge bg-blue-100 text-blue-700';
      }

      loadBookings(user.uid);
    });

    async function loadBookings(userId) {
      const container = document.getElementById('bookings-container');
      showLoading(container);

      try {
        const bookings = await getUserBookings(userId);
        renderBookings(bookings, container);
      } catch (err) {
        container.innerHTML = `
          <div class="text-center py-16 text-red-500">
            <p class="font-medium">Hiba a foglalások betöltése során</p>
            <p class="text-sm mt-1">${escapeHtml(err.message)}</p>
          </div>`;
      }
    }

    function renderBookings(bookings, container) {
      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
            <p class="text-gray-500 font-medium">Nincs közelgő foglalásod</p>
            <p class="text-gray-400 text-sm mt-1">
              Nézd meg az <a href="index.html" class="text-sage-600 underline">órarendet</a> és foglalj helyet!
            </p>
          </div>`;
        return;
      }

      const calIcon = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
      </svg>`;

      container.innerHTML = `
        <div class="space-y-3">
          ${bookings.map((b, i) => {
            const gcalUrl = generateGoogleCalendarUrl({
              title: b.classTitle,
              date: b.classDate,
              startTime: b.classStartTime,
              duration: b.classDuration || 60,
              location: b.classLocation || 'Pilates Studio',
              instructorName: b.instructorName || '',
              description: b.classDescription || '',
            });
            const hasCalEvent = !!b.calendarEventId;

            return `
            <div class="class-card animate-fade-in-up stagger-${(i % 4) + 1} opacity-0">
              <div class="flex flex-col sm:flex-row sm:items-center gap-4">
                <div class="flex-1">
                <h3 class="font-semibold text-gray-800">${escapeHtml(b.classTitle)}</h3>
                <p class="text-sm text-gray-500 mt-1">
                  ${formatDate(b.classDate)} &middot; ${escapeHtml(b.classStartTime)}
                    ${b.classLocation ? ` &middot; ${escapeHtml(b.classLocation)}` : ''}
                  </p>
                  ${hasCalEvent ? '<p class="text-xs text-green-600 mt-1 flex items-center gap-1">' + calIcon + ' Szinkronizálva a Google Naptárral</p>' : ''}
                </div>
                <div class="flex items-center gap-2 self-start">
                  ${!hasCalEvent
                    ? isGoogleCalendarAPIConfigured()
                      ? `<button class="gcal-sync-btn inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition"
                                 data-booking-id="${b.id}"
                                 data-class-title="${b.classTitle}"
                                 data-class-date="${b.classDate}"
                                 data-class-time="${b.classStartTime}"
                                 data-class-duration="${b.classDuration || 60}"
                                 data-class-location="${b.classLocation || ''}"
                                 data-instructor="${b.instructorName || ''}"
                                 data-description="${b.classDescription || ''}"
                                 title="Szinkronizálás a Google Naptárral">
                          ${calIcon} Naptár
                        </button>`
                      : `<a href="${gcalUrl}" target="_blank" rel="noopener"
                            class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition"
                            title="Hozzáadás a Google Naptárhoz">
                          ${calIcon} Naptár
                        </a>`
                    : ''
                  }
                  <button class="cancel-booking-btn btn-secondary btn-sm flex items-center gap-1"
                          data-booking-id="${b.id}" data-class-id="${b.classId}">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    Lemondás
                  </button>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      `;

      // Google Calendar API sync buttons
      container.querySelectorAll('.gcal-sync-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Szinkron...';

          try {
            const classData = {
              title: btn.dataset.classTitle,
              date: btn.dataset.classDate,
              startTime: btn.dataset.classTime,
              duration: parseInt(btn.dataset.classDuration) || 60,
              location: btn.dataset.classLocation,
              instructorName: btn.dataset.instructor,
              description: btn.dataset.description,
            };
            const eventId = await addEventToGoogleCalendar(classData);
            await saveCalendarEventId(btn.dataset.bookingId, eventId);
            showToast('Esemény hozzáadva a Google Naptárhoz!', 'success');

            const user = (await import('./js/firebase-config.js')).auth.currentUser;
            loadBookings(user.uid);
          } catch (err) {
            showToast('Naptár szinkron hiba: ' + err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = `${calIcon} Naptár`;
          }
        });
      });

      // Cancel buttons
      container.querySelectorAll('.cancel-booking-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await showConfirm('Biztosan le szeretnéd mondani ezt a foglalást?');
          if (!ok) return;

          btn.disabled = true;
          btn.textContent = 'Lemondás...';

          try {
            await cancelBooking(btn.dataset.bookingId, btn.dataset.classId);
            showToast('Foglalás sikeresen lemondva.', 'info');
            const user = (await import('./js/firebase-config.js')).auth.currentUser;
            loadBookings(user.uid);
          } catch (err) {
            showToast('Hiba a lemondás során: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Lemondás';
          }
        });
      });
    }
  </script>
</body>
</html>
