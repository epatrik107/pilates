<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Jelentkezz be a Pilates Studio fiókodba és foglalj pilates órát." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Bejelentkezés – Pilates Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6b8a53" />
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 px-3">

  <div class="w-100" style="max-width: 28rem;">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none">
        <h1 class="font-display fw-bold" style="color:var(--sage-700)">Pilates Studio</h1>
      </a>
      <p class="mt-2 text-muted small">Jelentkezz be a fiókodba</p>
    </div>

    <div class="card border shadow-sm rounded-4">
      <div class="card-body p-4 p-md-5">
        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label">E-mail cím</label>
            <input type="email" class="form-control" id="email" placeholder="nev@example.com" required />
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label mb-0">Jelszó</label>
              <button type="button" id="forgot-pw-link" class="btn btn-link btn-sm p-0 text-sage text-decoration-none" style="font-size:0.8rem">Elfelejtett jelszó?</button>
            </div>
            <input type="password" class="form-control mt-1" id="password" placeholder="••••••••" required />
          </div>

          <button type="submit" id="login-btn" class="btn btn-sage w-100">
            Bejelentkezés
          </button>

          <p id="error-msg" class="text-danger small text-center mt-3 mb-0 d-none"></p>
        </form>

        <!-- Forgot password panel -->
        <div id="forgot-panel" class="d-none mt-3 p-3 bg-sage-light rounded-3 border border-sage">
          <p class="small fw-medium mb-2" style="color:var(--sage-700)">Jelszó visszaállítása</p>
          <p class="small text-muted mb-2">Add meg az e-mail címedet, és küldünk egy linket a jelszó visszaállításához.</p>
          <form id="forgot-form" class="d-flex gap-2">
            <input type="email" id="forgot-email" class="form-control form-control-sm" placeholder="nev@example.com" required />
            <button type="submit" id="forgot-btn" class="btn btn-sm btn-sage flex-shrink-0">Küldés</button>
          </form>
          <p id="forgot-msg" class="small mt-2 mb-0 d-none"></p>
        </div>

        <div class="position-relative my-4">
          <hr class="text-muted">
          <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 small text-muted">vagy</span>
        </div>

        <button type="button" id="google-login-btn" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Bejelentkezés Google fiókkal
        </button>

        <div class="mt-4 text-center text-muted small">
          Még nincs fiókod?
          <a href="register.html" class="fw-medium text-decoration-none" style="color: var(--sage-600);">Regisztrálj itt</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loginUser, resetPassword, signInWithGoogle } from './js/auth.js';
    import { auth, onAuthStateChanged } from './js/firebase-config.js';
    import { checkRateLimit, initCookieConsent } from './js/ui.js';
    initCookieConsent();

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index.html';
    });

    const form     = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btn      = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('d-none');

      const rl = checkRateLimit('login', 5, 60000);
      if (!rl.allowed) {
        errorMsg.textContent = rl.message;
        errorMsg.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Bejelentkezés...';

      try {
        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        await loginUser(email, password);
        window.location.href = 'index.html';
      } catch (err) {
        const messages = {
          'auth/user-not-found':    'Ez az e-mail cím nincs regisztrálva.',
          'auth/wrong-password':    'Hibás jelszó.',
          'auth/invalid-credential':'Hibás e-mail cím vagy jelszó.',
          'auth/too-many-requests': 'Túl sok próbálkozás. A Firebase átmenetileg letiltotta ezt a fiókot. Próbáld újra pár perc múlva.',
          'auth/invalid-email':     'Érvénytelen e-mail cím formátum.',
          'auth/network-request-failed': 'Hálózati hiba. Ellenőrizd az internetkapcsolatod.'
        };
        const code = err.code || '';
        errorMsg.textContent = messages[code] || 'Hiba történt a bejelentkezés során.';
        errorMsg.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Bejelentkezés';
      }
    });

    // ── Forgot password ──────────────────────────────────
    const forgotPanel = document.getElementById('forgot-panel');
    const forgotForm  = document.getElementById('forgot-form');
    const forgotMsg   = document.getElementById('forgot-msg');

    document.getElementById('forgot-pw-link').addEventListener('click', () => {
      forgotPanel.classList.toggle('d-none');
      const emailVal = document.getElementById('email').value;
      if (emailVal) document.getElementById('forgot-email').value = emailVal;
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const forgotBtn = document.getElementById('forgot-btn');
      forgotBtn.disabled = true;
      forgotBtn.textContent = 'Küldés...';
      forgotMsg.classList.add('d-none');

      try {
        await resetPassword(email);
        forgotMsg.textContent = 'Jelszó-visszaállító email elküldve! Ellenőrizd a postaládádat.';
        forgotMsg.className = 'small mt-2 mb-0 text-success';
        forgotMsg.classList.remove('d-none');
      } catch (err) {
        const code = err.code || '';
        const msgs = {
          'auth/user-not-found': 'Ez az e-mail cím nincs regisztrálva.',
          'auth/invalid-email': 'Érvénytelen e-mail cím formátum.',
          'auth/too-many-requests': 'Túl sok próbálkozás. Próbáld újra később.'
        };
        forgotMsg.textContent = msgs[code] || 'Hiba történt. Próbáld újra.';
        forgotMsg.className = 'small mt-2 mb-0 text-danger';
        forgotMsg.classList.remove('d-none');
      } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = 'Küldés';
      }
    });

    // ── Google Sign-In ───────────────────────────────────
    document.getElementById('google-login-btn').addEventListener('click', async () => {
      const gBtn = document.getElementById('google-login-btn');
      gBtn.disabled = true;
      errorMsg.classList.add('d-none');
      try {
        await signInWithGoogle();
        window.location.href = 'index.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          errorMsg.textContent = 'Google bejelentkezés sikertelen: ' + (err.message || 'Ismeretlen hiba.');
          errorMsg.classList.remove('d-none');
        }
      } finally {
        gBtn.disabled = false;
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
