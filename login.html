<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Jelentkezz be a Balance Studio fiókodba és foglalj pilates órát." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Bejelentkezés – Balance Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6b8a53" />
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
</head>
<body class="auth-page d-flex align-items-center justify-content-center px-3">

  <div class="w-100" style="max-width: 28rem;">
    <div class="text-center mb-4">
      <a href="index.html" class="text-decoration-none auth-logo d-inline-block">
        <img src="img/logo.svg" alt="Balance Studio" height="80">
      </a>
      <p class="mt-2 small" style="color:var(--sage-400)">Jelentkezz be a fiókodba</p>
    </div>

    <div class="card auth-card rounded-4">
      <div class="card-body p-4 p-md-5">
        <form id="login-form">
          <div class="mb-3">
            <label for="email" class="form-label">E-mail cím</label>
            <input type="email" class="form-control" id="email" placeholder="nev@example.com" required />
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center">
              <label for="password" class="form-label mb-0">Jelszó</label>
              <button type="button" id="forgot-pw-link" class="btn btn-link btn-sm p-0 text-sage text-decoration-none" style="font-size:0.8rem">Elfelejtett jelszó?</button>
            </div>
            <div class="input-group mt-1">
              <input type="password" class="form-control" id="password" placeholder="••••••••" required />
              <button type="button" class="pw-toggle" tabindex="-1" aria-label="Jelszó megjelenítése">
                <svg class="pw-eye-open" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.01 9.96 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.01-9.964-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg class="pw-eye-closed hidden" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="remember-me" checked />
            <label class="form-check-label small" for="remember-me" style="color:var(--sage-500)">Maradjak bejelentkezve</label>
          </div>

          <button type="submit" id="login-btn" class="btn btn-sage w-100">
            Bejelentkezés
          </button>

          <p id="error-msg" class="text-danger small text-center mt-3 mb-0 d-none"></p>

          <!-- Unverified email panel -->
          <div id="verify-panel" class="d-none mt-3 p-3 bg-warning bg-opacity-10 border border-warning rounded-3 text-center">
            <p class="small fw-medium text-dark mb-2">Az email címed még nincs megerősítve!</p>
            <p class="small text-muted mb-2">Ellenőrizd a postaládádat (és a spam mappát).</p>
            <button type="button" id="resend-verify-btn" class="btn btn-sm btn-warning">Megerősítő email újraküldése</button>
            <p id="verify-msg" class="small mt-2 mb-0 d-none"></p>
          </div>
        </form>

        <!-- Forgot password panel -->
        <div id="forgot-panel" class="d-none mt-3 p-3 bg-sage-light rounded-3 border border-sage">
          <p class="small fw-medium mb-2" style="color:var(--sage-700)">Jelszó visszaállítása</p>
          <p class="small text-muted mb-2">Add meg az e-mail címedet, és küldünk egy linket a jelszó visszaállításához.</p>
          <form id="forgot-form" class="d-flex gap-2">
            <input type="email" id="forgot-email" class="form-control form-control-sm" placeholder="nev@example.com" required />
            <button type="submit" id="forgot-btn" class="btn btn-sm btn-sage flex-shrink-0">Küldés</button>
          </form>
          <p id="forgot-msg" class="small mt-2 mb-0 d-none"></p>
        </div>

        <div class="position-relative my-4">
          <hr style="border-color:var(--sage-200)">
          <span class="position-absolute top-50 start-50 translate-middle px-3 small" style="background:#fff;color:var(--sage-400)">vagy</span>
        </div>

        <button type="button" id="google-login-btn" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Bejelentkezés Google fiókkal
        </button>

        <div class="mt-4 text-center small" style="color:var(--sage-400)">
          Még nincs fiókod?
          <a href="register.html" class="fw-semibold text-decoration-none text-sage">Regisztrálj itt</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { loginUser, resetPassword, signInWithGoogle, resendVerificationEmail, logoutUser } from './js/auth.js';
    import { auth, onAuthStateChanged } from './js/firebase-config.js';
    import { setPersistence, browserLocalPersistence, browserSessionPersistence, applyActionCode, confirmPasswordReset } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';
    import { checkRateLimit, initCookieConsent, validatePassword } from './js/ui.js';
    initCookieConsent();

    // ── Handle Firebase email action links (verifyEmail, resetPassword) ──
    const urlParams = new URLSearchParams(window.location.search);
    const mode    = urlParams.get('mode');
    const oobCode = urlParams.get('oobCode');

    if (mode === 'resetPassword' && oobCode) {
      // Hide normal login form, show new password form
      document.getElementById('login-form').classList.add('d-none');
      document.querySelector('.mt-4.text-center').classList.add('d-none');
      const resetBox = document.createElement('div');
      resetBox.innerHTML = `
        <p class="fw-semibold mb-3" style="color:var(--sage-700)">Új jelszó megadása</p>
        <div class="mb-3">
          <label class="form-label">Új jelszó</label>
          <input type="password" id="new-pw" class="form-control" placeholder="legalább 8 karakter" minlength="8" required />
          <div id="pw-strength" class="mt-2 hidden">
            <div class="d-flex gap-1 mb-1" role="presentation">
              <div class="flex-fill rounded-pill bg-body-secondary" style="height:6px" id="pw-bar-1"></div>
              <div class="flex-fill rounded-pill bg-body-secondary" style="height:6px" id="pw-bar-2"></div>
              <div class="flex-fill rounded-pill bg-body-secondary" style="height:6px" id="pw-bar-3"></div>
              <div class="flex-fill rounded-pill bg-body-secondary" style="height:6px" id="pw-bar-4"></div>
            </div>
            <ul id="pw-checks" class="list-unstyled mb-0 small"></ul>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Jelszó megerősítése</label>
          <input type="password" id="new-pw2" class="form-control" placeholder="••••••••" required />
        </div>
        <button id="reset-pw-btn" class="btn btn-sage w-100">Jelszó mentése</button>
        <p id="reset-pw-msg" class="small mt-2 mb-0 d-none"></p>
      `;
      document.getElementById('login-form').before(resetBox);

      // ── Real-time password strength meter
      document.getElementById('new-pw').addEventListener('input', () => {
        const val = document.getElementById('new-pw').value;
        const pwStrength = document.getElementById('pw-strength');
        const pwChecks   = document.getElementById('pw-checks');
        if (!val) { pwStrength.classList.add('hidden'); return; }
        pwStrength.classList.remove('hidden');
        const result = validatePassword(val);
        const colors  = ['bg-danger', 'bg-warning', 'bg-warning', 'bg-success'];
        const barColor = colors[Math.min(result.strength - 1, 3)] || 'bg-body-secondary';
        for (let i = 1; i <= 4; i++) {
          document.getElementById(`pw-bar-${i}`).className =
            `flex-fill rounded-pill ${i <= result.strength ? barColor : 'bg-body-secondary'}`;
        }
        pwChecks.innerHTML = result.checks.map(c =>
          `<li class="small ${c.ok ? 'text-success' : 'text-muted'}">${c.ok ? '&#10003;' : '&#10007;'} ${c.msg}</li>`
        ).join('');
      });

      document.getElementById('reset-pw-btn').addEventListener('click', async () => {
        const pw1 = document.getElementById('new-pw').value;
        const pw2 = document.getElementById('new-pw2').value;
        const msg = document.getElementById('reset-pw-msg');
        const pwResult = validatePassword(pw1);
        if (!pwResult.valid) {
          msg.textContent = 'A jelszó nem elég erős: ' + pwResult.errors.join(', ') + '.';
          msg.className = 'small mt-2 mb-0 text-danger';
          msg.classList.remove('d-none');
          return;
        }
        if (pw1 !== pw2) {
          msg.textContent = 'A két jelszó nem egyezik.';
          msg.className = 'small mt-2 mb-0 text-danger';
          msg.classList.remove('d-none');
          return;
        }
        const btn = document.getElementById('reset-pw-btn');
        btn.disabled = true;
        btn.textContent = 'Mentés...';
        try {
          await confirmPasswordReset(auth, oobCode, pw1);
          resetBox.innerHTML = '<div class="alert alert-success small text-center"><strong>Jelszó sikeresen megváltoztatva!</strong> Most már bejelentkezhetsz az új jelszavaddal.</div><a href="login.html" class="btn btn-sage w-100 mt-2">Bejelentkezés</a>';
          history.replaceState(null, '', 'login.html');
        } catch (err) {
          const msgs = { 'auth/expired-action-code': 'A link lejárt. Kérj új jelszó-visszaállító emailt.', 'auth/invalid-action-code': 'Érvénytelen link. Kérj új jelszó-visszaállító emailt.', 'auth/weak-password': 'A jelszó túl gyenge.' };
          msg.textContent = msgs[err.code] || 'Hiba történt. Próbáld újra.';
          msg.className = 'small mt-2 mb-0 text-danger';
          msg.classList.remove('d-none');
          btn.disabled = false;
          btn.textContent = 'Jelszó mentése';
        }
      });
    } else if (mode === 'verifyEmail' && oobCode) {
      const info = document.createElement('div');
      info.className = 'alert small mb-3 text-center';
      info.textContent = 'Email cím megerősítése folyamatban...';
      info.classList.add('alert-info');
      document.getElementById('login-form').before(info);
      applyActionCode(auth, oobCode)
        .then(() => {
          info.className = 'alert alert-success small mb-3 text-center';
          info.innerHTML = '<strong>Email cím sikeresen megerősítve!</strong> Most már bejelentkezhetsz.';
          history.replaceState(null, '', 'login.html');
        })
        .catch(() => {
          info.className = 'alert alert-danger small mb-3 text-center';
          info.innerHTML = 'A megerősítő link érvénytelen vagy lejárt. Kérj új megerősítő emailt bejelentkezés után.';
          history.replaceState(null, '', 'login.html');
        });
    } else if (mode === 'recoverEmail' && oobCode) {
      const info = document.createElement('div');
      info.className = 'alert alert-info small mb-3 text-center';
      info.textContent = 'Email cím visszaállítása folyamatban...';
      document.getElementById('login-form').before(info);
      applyActionCode(auth, oobCode)
        .then(() => {
          info.className = 'alert alert-success small mb-3 text-center';
          info.innerHTML = '<strong>Email cím sikeresen visszaállítva!</strong> Javasoljuk, hogy változtasd meg a jelszavadat is.';
          history.replaceState(null, '', 'login.html');
        })
        .catch(() => {
          info.className = 'alert alert-danger small mb-3 text-center';
          info.innerHTML = 'A visszaállító link érvénytelen vagy lejárt.';
          history.replaceState(null, '', 'login.html');
        });
    }

    const verifiedParam = new URLSearchParams(window.location.search).get('verified');
    if (verifiedParam === 'pending') {
      const info = document.createElement('div');
      info.className = 'alert alert-success small mb-3 text-center';
      info.innerHTML = '<strong>Sikeres regisztráció!</strong> Ellenőrizd az email fiókodat és kattints a megerősítő linkre, utána bejelentkezhetsz.';
      document.getElementById('login-form').before(info);
      history.replaceState(null, '', 'login.html');
    } else if (verifiedParam === 'required') {
      const info = document.createElement('div');
      info.className = 'alert alert-warning small mb-3 text-center';
      info.innerHTML = 'Kérjük, erősítsd meg az email címedet a bejelentkezés előtt! Ellenőrizd a postaládádat.';
      document.getElementById('login-form').before(info);
      history.replaceState(null, '', 'login.html');
    }

    onAuthStateChanged(auth, (user) => {
      if (mode === 'resetPassword' || mode === 'verifyEmail' || mode === 'recoverEmail') return;
      if (user && user.emailVerified) window.location.href = 'index.html';
    });

    const form     = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btn      = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('d-none');

      const rl = checkRateLimit('login', 5, 60000);
      if (!rl.allowed) {
        errorMsg.textContent = rl.message;
        errorMsg.classList.remove('d-none');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Bejelentkezés...';

      try {
        const remember = document.getElementById('remember-me').checked;
        await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);

        const email    = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const user = await loginUser(email, password);

        if (!user.emailVerified) {
          showUnverifiedError();
          return;
        }
        window.location.href = 'index.html';
      } catch (err) {
        const messages = {
          'auth/user-not-found':    'Ez az e-mail cím nincs regisztrálva.',
          'auth/wrong-password':    'Hibás jelszó.',
          'auth/invalid-credential':'Hibás e-mail cím vagy jelszó.',
          'auth/too-many-requests': 'Túl sok próbálkozás. A Firebase átmenetileg letiltotta ezt a fiókot. Próbáld újra pár perc múlva.',
          'auth/invalid-email':     'Érvénytelen e-mail cím formátum.',
          'auth/network-request-failed': 'Hálózati hiba. Ellenőrizd az internetkapcsolatod.'
        };
        const code = err.code || '';
        errorMsg.textContent = messages[code] || 'Hiba történt a bejelentkezés során.';
        errorMsg.classList.remove('d-none');
        verifyPanel.classList.add('d-none');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Bejelentkezés';
      }
    });

    // ── Unverified email handling ─────────────────────────
    const verifyPanel = document.getElementById('verify-panel');

    function showUnverifiedError() {
      errorMsg.textContent = 'Az email címed nincs megerősítve!';
      errorMsg.classList.remove('d-none');
      verifyPanel.classList.remove('d-none');
    }

    document.getElementById('resend-verify-btn').addEventListener('click', async () => {
      const resendBtn = document.getElementById('resend-verify-btn');
      const verifyMsg = document.getElementById('verify-msg');
      resendBtn.disabled = true;
      resendBtn.textContent = 'Küldés...';
      verifyMsg.classList.add('d-none');
      try {
        await resendVerificationEmail();
        verifyMsg.textContent = 'Email elküldve! Ellenőrizd a postaládádat.';
        verifyMsg.className = 'small mt-2 mb-0 text-success';
        verifyMsg.classList.remove('d-none');
      } catch (err) {
        verifyMsg.textContent = err.message || 'Hiba az email küldésekor.';
        verifyMsg.className = 'small mt-2 mb-0 text-danger';
        verifyMsg.classList.remove('d-none');
      } finally {
        resendBtn.disabled = false;
        resendBtn.textContent = 'Megerősítő email újraküldése';
      }
    });

    // ── Forgot password ──────────────────────────────────
    const forgotPanel = document.getElementById('forgot-panel');
    const forgotForm  = document.getElementById('forgot-form');
    const forgotMsg   = document.getElementById('forgot-msg');

    document.getElementById('forgot-pw-link').addEventListener('click', () => {
      forgotPanel.classList.toggle('d-none');
      const emailVal = document.getElementById('email').value;
      if (emailVal) document.getElementById('forgot-email').value = emailVal;
    });

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgot-email').value.trim();
      const forgotBtn = document.getElementById('forgot-btn');
      forgotBtn.disabled = true;
      forgotBtn.textContent = 'Küldés...';
      forgotMsg.classList.add('d-none');

      try {
        await resetPassword(email);
        forgotMsg.textContent = 'Jelszó-visszaállító email elküldve! Ellenőrizd a postaládádat.';
        forgotMsg.className = 'small mt-2 mb-0 text-success';
        forgotMsg.classList.remove('d-none');
      } catch (err) {
        const code = err.code || '';
        const msgs = {
          'auth/user-not-found': 'Ez az e-mail cím nincs regisztrálva.',
          'auth/invalid-email': 'Érvénytelen e-mail cím formátum.',
          'auth/too-many-requests': 'Túl sok próbálkozás. Próbáld újra később.'
        };
        forgotMsg.textContent = msgs[code] || 'Hiba történt. Próbáld újra.';
        forgotMsg.className = 'small mt-2 mb-0 text-danger';
        forgotMsg.classList.remove('d-none');
      } finally {
        forgotBtn.disabled = false;
        forgotBtn.textContent = 'Küldés';
      }
    });

    // ── Password visibility toggle ─────────────────────────
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.querySelector('.pw-eye-open').classList.toggle('hidden', isHidden);
        btn.querySelector('.pw-eye-closed').classList.toggle('hidden', !isHidden);
      });
    });

    // ── Google Sign-In ───────────────────────────────────
    document.getElementById('google-login-btn').addEventListener('click', async () => {
      const gBtn = document.getElementById('google-login-btn');
      gBtn.disabled = true;
      errorMsg.classList.add('d-none');
      verifyPanel.classList.add('d-none');
      try {
        const remember = document.getElementById('remember-me').checked;
        await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
        const user = await signInWithGoogle();
        if (!user.emailVerified) {
          showUnverifiedError();
          return;
        }
        window.location.href = 'index.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          errorMsg.textContent = 'Google bejelentkezés sikertelen: ' + (err.message || 'Ismeretlen hiba.');
          errorMsg.classList.remove('d-none');
        }
      } finally {
        gBtn.disabled = false;
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
