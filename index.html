<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pilates Studio – Foglalj mat, reformer és tower pilates órát online! Kis csoportos edzések kezdőtől haladóig, Szonja oktatóval." />
  <meta name="keywords" content="pilates, pilates óra, reformer pilates, mat pilates, tower pilates, online foglalás, edzés, Szonja" />
  <meta name="author" content="Pilates Studio" />

  <!-- Open Graph (Facebook, Instagram, LinkedIn) -->
  <meta property="og:title" content="Pilates Studio – Online órafoglalás" />
  <meta property="og:description" content="Foglalj mat, reformer és tower pilates órát online! Kis csoportos edzések kezdőtől haladóig." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pilatesstudio.hu/" />
  <meta property="og:locale" content="hu_HU" />
  <meta property="og:site_name" content="Pilates Studio" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Pilates Studio – Online órafoglalás" />
  <meta name="twitter:description" content="Foglalj mat, reformer és tower pilates órát online! Kis csoportos edzések kezdőtől haladóig." />

  <title>Pilates Studio – Online pilates órafoglalás</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="canonical" href="https://pilatesstudio.hu/" />
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar navbar-expand-md border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <svg class="text-sage" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 2.69-9 6s4.03 6 9 6 9-2.69 9-6-4.03-6-9-6zM3 12v3c0 3.31 4.03 6 9 6s9-2.69 9-6v-3" />
        </svg>
        Pilates Studio
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul id="nav-links" class="navbar-nav me-auto mb-2 mb-md-0"></ul>
        <ul id="nav-right" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <!-- ═══ SCHEDULE ═══ -->
  <main class="container py-4">
    <h1 class="font-display text-center fw-bold mb-4" style="color:var(--sage-800)">ÓRAREND</h1>

    <!-- Filters -->
    <div class="card border mb-4">
      <div class="card-body">
        <div class="row g-2 mb-2">
          <div class="col-sm-6">
            <select id="filter-instructor" class="form-select">
              <option value="all">Oktatók kiválasztása</option>
            </select>
          </div>
          <div class="col-sm-6">
            <select id="filter-type" class="form-select">
              <option value="all">Foglalkozások kiválasztása</option>
            </select>
          </div>
        </div>
        <div class="d-flex flex-wrap gap-3 justify-content-center small">
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="1" checked id="d1"><label class="form-check-label" for="d1">Hétfő</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="2" checked id="d2"><label class="form-check-label" for="d2">Kedd</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="3" checked id="d3"><label class="form-check-label" for="d3">Szerda</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="4" checked id="d4"><label class="form-check-label" for="d4">Csütörtök</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="5" checked id="d5"><label class="form-check-label" for="d5">Péntek</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="6" checked id="d6"><label class="form-check-label" for="d6">Szombat</label></div>
          <div class="form-check"><input class="form-check-input day-filter" type="checkbox" value="0" checked id="d0"><label class="form-check-label" for="d0">Vasárnap</label></div>
        </div>
      </div>
    </div>

    <!-- Table header (desktop) -->
    <div class="d-none d-md-flex row fw-semibold text-muted small border-bottom pb-2 mb-1 px-3">
      <div class="col-1"></div>
      <div class="col-2">Oktató</div>
      <div class="col-3">Időpont</div>
      <div class="col-4">Foglalkozás</div>
      <div class="col-2"></div>
    </div>

    <div id="classes-container"></div>
  </main>

  <footer class="border-top py-4 mt-5">
    <div class="container text-center text-muted small">
      &copy; 2026 Pilates Studio. Minden jog fenntartva.
      &middot; <a href="privacy.html" class="text-sage text-decoration-none">Adatvédelem</a>
      &middot; <a href="terms.html" class="text-sage text-decoration-none">ÁSZF</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { auth, onAuthStateChanged } from './js/firebase-config.js';
    import { getUpcomingClasses, getClassTypes } from './js/classes.js';
    import { bookClass, getUserBookingForClass, cancelBooking } from './js/bookings.js';
    import { initNavbar, showToast, showLoading, showConfirm, formatDate, escapeHtml } from './js/ui.js';

    initNavbar();

    const container        = document.getElementById('classes-container');
    const filterType       = document.getElementById('filter-type');
    const filterInstructor = document.getElementById('filter-instructor');
    const dayCheckboxes    = document.querySelectorAll('.day-filter');

    let allClasses = [], currentUser = null, classTypes = [];

    onAuthStateChanged(auth, (user) => { currentUser = user; loadClasses(); });
    filterType.addEventListener('change', renderClasses);
    filterInstructor.addEventListener('change', renderClasses);
    dayCheckboxes.forEach(cb => cb.addEventListener('change', renderClasses));

    async function loadClasses() {
      showLoading(container);
      try {
        [allClasses, classTypes] = await Promise.all([getUpcomingClasses(), getClassTypes()]);
        populateInstructorFilter();
        populateTypeFilter();
        renderClasses();
      } catch (err) {
        container.innerHTML = `<div class="text-center py-5 text-danger"><p class="fw-medium">Hiba az órák betöltése során</p><p class="small">${escapeHtml(err.message)}</p></div>`;
      }
    }

    function populateTypeFilter() {
      const current = filterType.value;
      filterType.innerHTML = '<option value="all">Foglalkozások kiválasztása</option>';
      classTypes.forEach(t => {
        filterType.innerHTML += `<option value="${escapeHtml(t.value)}">${escapeHtml(t.label)}</option>`;
      });
      filterType.value = current;
    }

    function populateInstructorFilter() {
      const instructors = [...new Set(allClasses.map(c => c.instructorName).filter(Boolean))];
      filterInstructor.innerHTML = '<option value="all">Oktatók kiválasztása</option>';
      instructors.forEach(n => { filterInstructor.innerHTML += `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`; });
    }

    function getEndTime(s, dur) {
      const [h, m] = s.split(':').map(Number);
      const t = h * 60 + m + (parseInt(dur) || 60);
      return `${String(Math.floor(t/60)%24).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
    }

    function getDayOfWeek(d) { return new Date(d+'T00:00:00').getDay(); }

    function getTypeName(t) {
      const found = classTypes.find(ct => ct.value === t);
      return found ? escapeHtml(found.label) : (escapeHtml(t) || 'Pilates');
    }

    async function renderClasses() {
      const typeVal = filterType.value;
      const instrVal = filterInstructor.value;
      const activeDays = new Set([...dayCheckboxes].filter(cb => cb.checked).map(cb => Number(cb.value)));

      let filtered = allClasses.filter(c => {
        if (typeVal !== 'all' && c.type !== typeVal) return false;
        if (instrVal !== 'all' && c.instructorName !== instrVal) return false;
        if (!activeDays.has(getDayOfWeek(c.date))) return false;
        return true;
      });

      if (!filtered.length) {
        container.innerHTML = '<div class="text-center py-5 text-muted">Nincs megjeleníthető óra. Próbáld módosítani a szűrőket.</div>';
        return;
      }

      const grouped = {};
      filtered.forEach(c => { (grouped[c.date] ??= []).push(c); });

      let html = '';
      for (const [date, classes] of Object.entries(grouped)) {
        html += `<div class="schedule-date-header mt-3">${formatDate(date)}</div><div class="bg-white border border-top-0 rounded-bottom mb-2">`;
        for (const cls of classes) {
          const isFull = cls.currentBookings >= cls.maxCapacity;
          const free = cls.maxCapacity - cls.currentBookings;
          const end = getEndTime(cls.startTime, cls.duration);
          let userBooking = null;
          if (currentUser) userBooking = await getUserBookingForClass(currentUser.uid, cls.id);

          let statusHtml, statusClass;
          if (isFull) { statusHtml = 'Minden hely betelt!'; statusClass = 'text-danger'; }
          else if (free <= 2) { statusHtml = `${free} szabad hely!`; statusClass = 'text-danger'; }
          else { statusHtml = `${free} szabad hely`; statusClass = 'text-success'; }

          let actionBtn;
          if (currentUser) {
            if (userBooking) actionBtn = `<button class="btn btn-sm btn-outline-secondary cancel-btn" data-booking-id="${userBooking.id}" data-class-id="${cls.id}">Lemondás</button>`;
            else if (isFull) actionBtn = `<button class="btn btn-sm btn-motibro-orange" disabled>Várólistára</button>`;
            else actionBtn = `<button class="btn btn-sm btn-motibro-green book-btn" data-class-id="${cls.id}">Foglalás</button>`;
          } else {
            actionBtn = `<a href="login.html" class="btn btn-sm btn-motibro-green">Bejelentkezés</a>`;
          }

          const instructorImg = cls.instructorPhoto || 'img/szonja.png';

          // Desktop
          html += `<div class="schedule-row d-none d-md-flex align-items-center row px-3">
            <div class="col-1 d-flex justify-content-center"><img src="${instructorImg}" alt="${escapeHtml(cls.instructorName)}" class="instructor-avatar"></div>
            <div class="col-2 fw-medium">${escapeHtml(cls.instructorName)}</div>
            <div class="col-3"><div class="fw-semibold">${escapeHtml(cls.startTime)} - ${end}</div><div class="small fw-semibold ${statusClass}">${statusHtml}</div></div>
            <div class="col-4"><div>${getTypeName(cls.type)}</div>${cls.title?`<div class="text-muted small">${escapeHtml(cls.title)}</div>`:''}</div>
            <div class="col-2 text-end">${actionBtn}</div>
          </div>`;

          // Mobile
          html += `<div class="schedule-row d-md-none px-3">
            <div class="d-flex align-items-center gap-3">
              <img src="${instructorImg}" alt="${escapeHtml(cls.instructorName)}" class="instructor-avatar flex-shrink-0">
              <div class="flex-grow-1">
                <div class="fw-medium">${escapeHtml(cls.instructorName)}</div>
                <div class="small text-muted">${escapeHtml(cls.startTime)} - ${end} · ${getTypeName(cls.type)}</div>
                <div class="small fw-semibold ${statusClass}">${statusHtml}</div>
              </div>
              <div class="flex-shrink-0">${actionBtn}</div>
            </div>
          </div>`;
        }
        html += '</div>';
      }
      container.innerHTML = html;

      container.querySelectorAll('.book-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const cls = allClasses.find(c => c.id === btn.dataset.classId);
          if (!cls) return;
          btn.disabled = true; btn.textContent = 'Foglalás...';
          try {
            await bookClass(currentUser, cls);
            showToast('Sikeresen foglaltál!', 'success');
            allClasses = await getUpcomingClasses(); renderClasses();
          } catch (err) { showToast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Foglalás'; }
        });
      });

      container.querySelectorAll('.cancel-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!await showConfirm('Biztosan le szeretnéd mondani a foglalásod?')) return;
          btn.disabled = true; btn.textContent = 'Lemondás...';
          try {
            await cancelBooking(btn.dataset.bookingId, btn.dataset.classId);
            showToast('Foglalás lemondva.', 'info');
            allClasses = await getUpcomingClasses(); renderClasses();
          } catch (err) { showToast('Hiba a lemondás során.', 'error'); btn.disabled = false; btn.textContent = 'Lemondás'; }
        });
      });
    }
  </script>
</body>
</html>
