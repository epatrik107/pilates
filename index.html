<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Órarend – Pilates Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: { 50:'#f4f7f0',100:'#e6edde',200:'#cddabd',300:'#a9bf93',400:'#87a46e',500:'#6b8a53',600:'#536d3f',700:'#425634',800:'#37462d',900:'#2f3b27' },
            cream: '#faf8f4'
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Google Calendar API (optional – if configured) -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav id="navbar" class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <svg class="w-8 h-8 text-sage-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 2.69-9 6s4.03 6 9 6 9-2.69 9-6-4.03-6-9-6zM3 12v3c0 3.31 4.03 6 9 6s9-2.69 9-6v-3" />
          </svg>
          <span class="font-display text-xl font-bold text-sage-700">Pilates Studio</span>
        </a>

        <!-- Desktop nav -->
        <div id="desktop-nav" class="hidden md:flex items-center gap-1">
          <a href="index.html" class="nav-link">Órarend</a>
          <a href="login.html" class="nav-link">Bejelentkezés</a>
          <a href="register.html" class="nav-link nav-link-primary">Regisztráció</a>
        </div>

        <!-- Hamburger -->
        <button id="menu-toggle" class="md:hidden p-2 rounded-lg hover:bg-gray-100">
          <svg class="w-6 h-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>

      <!-- Mobile menu -->
      <div id="mobile-menu" class="hidden md:hidden pb-4">
        <div id="mobile-nav" class="flex flex-col gap-1">
          <a href="index.html" class="nav-link">Órarend</a>
          <a href="login.html" class="nav-link">Bejelentkezés</a>
          <a href="register.html" class="nav-link nav-link-primary">Regisztráció</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══ HERO ═══ -->
  <section class="hero-gradient py-16 sm:py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
      <h1 class="text-4xl sm:text-5xl font-display font-bold text-sage-800 mb-4">
        Találd meg a tökéletes Pilates órát
      </h1>
      <p class="text-lg text-sage-600 max-w-2xl mx-auto">
        Böngészd az elérhető órákat, foglalj helyet egyetlen kattintással, és kezdd el az utadat egy erősebb, rugalmasabb test felé.
      </p>
    </div>
  </section>

  <!-- ═══ FILTERS ═══ -->
  <section class="max-w-6xl mx-auto px-4 sm:px-6 -mt-6">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col sm:flex-row gap-3 items-end">
      <div class="flex-1 w-full">
        <label class="form-label">Szűrés típus szerint</label>
        <select id="filter-type" class="form-input">
          <option value="all">Összes típus</option>
          <option value="mat">Mat Pilates</option>
          <option value="reformer">Reformer</option>
          <option value="tower">Tower</option>
          <option value="prenatal">Kismama</option>
        </select>
      </div>
      <div class="flex-1 w-full">
        <label class="form-label">Szűrés dátum szerint</label>
        <input type="date" id="filter-date" class="form-input" />
      </div>
      <button id="clear-filters" class="btn-secondary btn-sm whitespace-nowrap">Szűrők törlése</button>
    </div>
  </section>

  <!-- ═══ SCHEDULE ═══ -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-10">
    <div id="classes-container">
      <!-- Loading... -->
    </div>
  </main>

  <!-- ═══ FOOTER ═══ -->
  <footer class="border-t border-gray-100 py-8 mt-10">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-sm text-gray-400">
      &copy; 2026 Pilates Studio. Minden jog fenntartva.
    </div>
  </footer>

  <script type="module">
    import { auth, onAuthStateChanged, googleCalendarConfig } from './js/firebase-config.js';
    import { getUpcomingClasses } from './js/classes.js';
    import { bookClass, getUserBookingForClass, cancelBooking, saveCalendarEventId } from './js/bookings.js';
    import { initNavbar, showToast, showLoading, showConfirm, formatDate, escapeHtml } from './js/ui.js';
    import {
      generateGoogleCalendarUrl,
      initGoogleCalendarAPI,
      isGoogleCalendarAPIConfigured,
      addEventToGoogleCalendar
    } from './js/google-calendar.js';

    initNavbar();

    // Google Calendar API initialization (if configured)
    let gcalAPIEnabled = false;
    if (googleCalendarConfig.clientId && googleCalendarConfig.apiKey) {
      initGoogleCalendarAPI(googleCalendarConfig.clientId, googleCalendarConfig.apiKey)
        .then(ok => { gcalAPIEnabled = ok; })
        .catch(() => {});
    }

    const container    = document.getElementById('classes-container');
    const filterType   = document.getElementById('filter-type');
    const filterDate   = document.getElementById('filter-date');
    const clearFilters = document.getElementById('clear-filters');

    let allClasses  = [];
    let currentUser = null;

    // ── Auth state listener ──────────────────────────────
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      loadClasses();
    });

    // ── Filters ─────────────────────────────────────────────
    filterType.addEventListener('change', renderClasses);
    filterDate.addEventListener('change', renderClasses);
    clearFilters.addEventListener('click', () => {
      filterType.value = 'all';
      filterDate.value = '';
      renderClasses();
    });

    // ── Load classes ─────────────────────────────────────
    async function loadClasses() {
      showLoading(container);
      try {
        allClasses = await getUpcomingClasses();
        renderClasses();
      } catch (err) {
        container.innerHTML = `
          <div class="text-center py-16 text-red-500">
            <p class="font-medium">Hiba az órák betöltése során</p>
            <p class="text-sm mt-1">${escapeHtml(err.message)}</p>
          </div>
        `;
      }
    }

    // ── Google Calendar SVG icon ───────────────────────────
    const calendarSvg = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5m-9-3.75h.008v.008H12v-.008zM12 15h.008v.008H12V15zm0 2.25h.008v.008H12v-.008zM9.75 15h.008v.008H9.75V15zm0 2.25h.008v.008H9.75v-.008zM7.5 15h.008v.008H7.5V15zm0 2.25h.008v.008H7.5v-.008zm6.75-4.5h.008v.008h-.008v-.008zm0 2.25h.008v.008h-.008V15zm0 2.25h.008v.008h-.008v-.008zm2.25-4.5h.008v.008H16.5v-.008zm0 2.25h.008v.008H16.5V15z" />
    </svg>`;

    // ── Render ───────────────────────────────────────
    async function renderClasses() {
      let filtered = [...allClasses];

      const typeVal = filterType.value;
      const dateVal = filterDate.value;

      if (typeVal !== 'all') {
        filtered = filtered.filter(c => c.type === typeVal);
      }
      if (dateVal) {
        filtered = filtered.filter(c => c.date === dateVal);
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
            <p class="text-gray-500 font-medium">Nincs megjeleníthető óra</p>
            <p class="text-gray-400 text-sm mt-1">Próbáld módosítani a szűrőket</p>
          </div>
        `;
        return;
      }

      // Group by date
      const grouped = {};
      filtered.forEach(c => {
        if (!grouped[c.date]) grouped[c.date] = [];
        grouped[c.date].push(c);
      });

      let html = '';
      let staggerIdx = 0;

      for (const [date, classes] of Object.entries(grouped)) {
        html += `
          <div class="mb-8">
            <h2 class="text-lg font-display font-semibold text-sage-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-sage-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
              </svg>
              ${formatDate(date)}
            </h2>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
        `;

        for (const cls of classes) {
          const isFull      = cls.currentBookings >= cls.maxCapacity;
          const freeSpots   = cls.maxCapacity - cls.currentBookings;
          const fillPercent = Math.min((cls.currentBookings / cls.maxCapacity) * 100, 100);
          const fillColor   = fillPercent >= 90 ? 'bg-red-400' : fillPercent >= 60 ? 'bg-amber-400' : 'bg-sage-400';
          const badgeClass  = `badge-${cls.type || 'default'}`;
          const stagger     = `stagger-${(staggerIdx++ % 4) + 1}`;

          let userBooking = null;
          if (currentUser) {
            userBooking = await getUserBookingForClass(currentUser.uid, cls.id);
          }

          const gcalUrl = generateGoogleCalendarUrl(cls);

          html += `
            <div class="class-card animate-fade-in-up ${stagger} opacity-0">
              <div class="flex items-start justify-between mb-3">
                <div>
                  <span class="badge ${badgeClass}">${getTypeName(cls.type)}</span>
                  <h3 class="text-lg font-semibold text-gray-800 mt-1">${escapeHtml(cls.title)}</h3>
                </div>
                <span class="text-2xl font-bold text-sage-600">${escapeHtml(cls.startTime)}</span>
              </div>

              ${cls.description ? `<p class="text-sm text-gray-500 mb-3">${escapeHtml(cls.description)}</p>` : ''}

              <div class="flex items-center gap-4 text-sm text-gray-500 mb-3">
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                  ${cls.duration} perc
                </span>
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                  </svg>
                  ${escapeHtml(cls.location || 'Stúdió')}
                </span>
              </div>

              <div class="flex items-center gap-2 text-sm text-gray-500 mb-3">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0" />
                </svg>
                <span>${escapeHtml(cls.instructorName)}</span>
              </div>

              <!-- Capacity bar -->
              <div class="mb-4">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                  <span>${isFull ? 'Betelt' : `${freeSpots} szabad hely`}</span>
                  <span>${cls.currentBookings}/${cls.maxCapacity}</span>
                </div>
                <div class="capacity-bar">
                  <div class="capacity-bar-fill ${fillColor}" style="width: ${fillPercent}%"></div>
                </div>
              </div>

              <!-- Action buttons -->
              ${currentUser
                ? userBooking
                  ? `<div class="flex gap-2">
                       <button class="btn-secondary btn-sm flex-1 cancel-btn" data-booking-id="${userBooking.id}" data-class-id="${cls.id}">
                         Foglalás lemondása
                       </button>
                       <a href="${gcalUrl}" target="_blank" rel="noopener"
                          class="gcal-link-btn inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition"
                          title="Hozzáadás a Google Naptárhoz">
                         ${calendarSvg}
                       </a>
                     </div>`
                  : `<button class="btn-primary btn-sm w-full book-btn" data-class-id="${cls.id}" ${isFull ? 'disabled' : ''}>
                       ${isFull ? 'Betelt' : 'Foglalás'}
                     </button>`
                : `<a href="login.html" class="btn-primary btn-sm w-full block text-center">
                     Jelentkezz be a foglaláshoz
                   </a>`
              }
            </div>
          `;
        }

        html += `</div></div>`;
      }

      container.innerHTML = html;

      // Book buttons
      container.querySelectorAll('.book-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const classId  = btn.dataset.classId;
          const classData = allClasses.find(c => c.id === classId);
          if (!classData) return;

          btn.disabled = true;
          btn.textContent = 'Foglalás...';

          try {
            const bookingRef = await bookClass(currentUser, classData);

            // Google Calendar API sync (if configured)
            if (isGoogleCalendarAPIConfigured()) {
              try {
                const eventId = await addEventToGoogleCalendar(classData);
                await saveCalendarEventId(bookingRef.id, eventId);
                showToast('Sikeresen foglaltál! Az esemény hozzáadva a Google Naptáradhoz.', 'success');
              } catch (calErr) {
                console.warn('Google Calendar sync failed:', calErr);
                showToast('Foglalás sikeres! (Naptár szinkron nem sikerült)', 'warning');
              }
            } else {
              showToast('Sikeresen foglaltál!', 'success');
            }

            allClasses = await getUpcomingClasses();
            renderClasses();
          } catch (err) {
            showToast(err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Foglalás';
          }
        });
      });

      // Cancel buttons
      container.querySelectorAll('.cancel-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await showConfirm('Biztosan le szeretnéd mondani a foglalásod?');
          if (!ok) return;

          btn.disabled = true;
          btn.textContent = 'Lemondás...';

          try {
            await cancelBooking(btn.dataset.bookingId, btn.dataset.classId);
            showToast('Foglalás sikeresen lemondva.', 'info');
            allClasses = await getUpcomingClasses();
            renderClasses();
          } catch (err) {
            showToast('Hiba a lemondás során.', 'error');
            btn.disabled = false;
            btn.textContent = 'Foglalás lemondása';
          }
        });
      });
    }

    function getTypeName(type) {
      const names = {
        mat: 'Mat Pilates',
        reformer: 'Reformer',
        tower: 'Tower',
        prenatal: 'Kismama',
      };
      return names[type] || escapeHtml(type) || 'Pilates';
    }
  </script>
</body>
</html>
