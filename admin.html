<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – Pilates Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="navbar navbar-expand-md border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <svg class="text-sage" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3c-4.97 0-9 2.69-9 6s4.03 6 9 6 9-2.69 9-6-4.03-6-9-6zM3 12v3c0 3.31 4.03 6 9 6s9-2.69 9-6v-3" />
        </svg>
        Pilates Studio
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul id="nav-links" class="navbar-nav me-auto mb-2 mb-md-0"></ul>
        <ul id="nav-right" class="navbar-nav"></ul>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="container py-4 py-md-5">

    <!-- Header -->
    <div class="d-flex flex-column flex-sm-row align-items-sm-center justify-content-sm-between gap-3 mb-4">
      <div>
        <h1 class="font-display fw-bold mb-1" style="color:var(--sage-800)">Admin Dashboard</h1>
        <p class="text-muted small mb-0">Órarendkezelés és résztvevők</p>
      </div>
      <button type="button" id="open-create-modal" class="btn btn-sage d-inline-flex align-items-center gap-2 align-self-start">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        Új óra meghirdetése
      </button>
    </div>

    <!-- Classes list -->
    <div id="admin-classes">
      <!-- Loading... -->
    </div>
  </main>

  <!-- ═══ CLASS CREATE/EDIT MODAL ═══ -->
  <div id="class-modal" class="modal-backdrop-custom p-3 hidden">
    <div class="bg-white rounded-3 shadow-lg w-100 p-4" style="max-width:32rem;max-height:90vh;overflow-y:auto">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 id="modal-title" class="h5 font-display fw-semibold mb-0" style="color:var(--sage-800)">Új óra meghirdetése</h2>
        <button type="button" id="close-modal" class="btn btn-link text-muted p-1 border-0">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <form id="class-form">
        <input type="hidden" id="edit-class-id" value="" />

        <div class="row g-3">
          <div class="col-12">
            <label for="class-title" class="form-label">Óra neve</label>
            <input type="text" id="class-title" class="form-control" placeholder="pl. Mat Pilates kezdő" required />
          </div>

          <div class="col-md-6">
            <label for="class-type" class="form-label">Típus</label>
            <select id="class-type" class="form-select" required>
              <option value="mat">Mat Pilates</option>
              <option value="reformer">Reformer</option>
              <option value="tower">Tower</option>
              <option value="prenatal">Kismama</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="class-location" class="form-label">Helyszín</label>
            <input type="text" id="class-location" class="form-control" placeholder="Stúdió A" value="Stúdió" />
          </div>

          <div class="col-md-6">
            <label for="class-date" class="form-label">Dátum</label>
            <input type="date" id="class-date" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label for="class-time" class="form-label">Kezdés ideje</label>
            <input type="time" id="class-time" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label for="class-duration" class="form-label">Időtartam (perc)</label>
            <input type="number" id="class-duration" class="form-control" value="60" min="15" max="180" required />
          </div>

          <div class="col-md-6">
            <label for="class-capacity" class="form-label">Max. létszám</label>
            <input type="number" id="class-capacity" class="form-control" value="10" min="1" max="50" required />
          </div>

          <div class="col-12">
            <label for="class-description" class="form-label">Leírás (opcionális)</label>
            <textarea id="class-description" class="form-control" rows="3" placeholder="Rövid leírás az óráról..."></textarea>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end pt-3 mt-1">
          <button type="button" id="cancel-modal" class="btn btn-outline-secondary">Mégse</button>
          <button type="submit" id="save-class-btn" class="btn btn-sage">Mentés</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══ PARTICIPANTS MODAL ═══ -->
  <div id="participants-modal" class="modal-backdrop-custom p-3 hidden">
    <div class="bg-white rounded-3 shadow-lg w-100 p-4" style="max-width:28rem;max-height:80vh;overflow-y:auto">
      <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 id="participants-title" class="h5 font-display fw-semibold mb-0" style="color:var(--sage-800)">Résztvevők</h2>
        <button type="button" id="close-participants" class="btn btn-link text-muted p-1 border-0">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div id="participants-list">
        <!-- Participants list -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initNavbar, requireAdmin, showToast, showLoading, showConfirm, formatDate, escapeHtml } from './js/ui.js';
    import { createClass, updateClass, deleteClass, getAllClasses, getUpcomingClasses } from './js/classes.js';
    import { getBookingsForClass } from './js/bookings.js';

    initNavbar();

    let adminUser    = null;
    let adminProfile = null;

    requireAdmin((user, profile) => {
      adminUser    = user;
      adminProfile = profile;
      loadAdminClasses();
    });

    // ── DOM elements ─────────────────────────────────────────
    const classesContainer  = document.getElementById('admin-classes');
    const modal             = document.getElementById('class-modal');
    const modalTitle        = document.getElementById('modal-title');
    const classForm         = document.getElementById('class-form');
    const editClassId       = document.getElementById('edit-class-id');
    const participantsModal = document.getElementById('participants-modal');
    const participantsTitle = document.getElementById('participants-title');
    const participantsList  = document.getElementById('participants-list');

    // ── Modal handling ──────────────────────────────────────
    document.getElementById('open-create-modal').addEventListener('click', () => openModal());
    document.getElementById('close-modal').addEventListener('click', () => closeModal());
    document.getElementById('cancel-modal').addEventListener('click', () => closeModal());
    document.getElementById('close-participants').addEventListener('click', () => {
      participantsModal.classList.add('hidden');
    });

    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    participantsModal.addEventListener('click', (e) => { if (e.target === participantsModal) participantsModal.classList.add('hidden'); });

    function openModal(classData = null) {
      editClassId.value = '';
      classForm.reset();

      if (classData) {
        modalTitle.textContent = 'Óra szerkesztése';
        editClassId.value = classData.id;
        document.getElementById('class-title').value       = classData.title;
        document.getElementById('class-type').value        = classData.type;
        document.getElementById('class-location').value    = classData.location || '';
        document.getElementById('class-date').value        = classData.date;
        document.getElementById('class-time').value        = classData.startTime;
        document.getElementById('class-duration').value    = classData.duration;
        document.getElementById('class-capacity').value    = classData.maxCapacity;
        document.getElementById('class-description').value = classData.description || '';
      } else {
        modalTitle.textContent = 'Új óra meghirdetése';
      }

      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
    }

    // ── Save class (create / update) ───────────────
    classForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-class-btn');
      btn.disabled = true;
      btn.textContent = 'Mentés...';

      const data = {
        title:          document.getElementById('class-title').value.trim(),
        type:           document.getElementById('class-type').value,
        location:       document.getElementById('class-location').value.trim(),
        date:           document.getElementById('class-date').value,
        startTime:      document.getElementById('class-time').value,
        duration:       parseInt(document.getElementById('class-duration').value) || 60,
        maxCapacity:    parseInt(document.getElementById('class-capacity').value) || 10,
        description:    document.getElementById('class-description').value.trim(),
        instructorId:   adminUser.uid,
        instructorName: adminProfile.name || adminUser.displayName || 'Edző',
      };

      try {
        const id = editClassId.value;
        if (id) {
          await updateClass(id, data);
          showToast('Óra sikeresen módosítva!', 'success');
        } else {
          await createClass(data);
          showToast('Új óra sikeresen létrehozva!', 'success');
        }
        closeModal();
        loadAdminClasses();
      } catch (err) {
        showToast('Hiba: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Mentés';
      }
    });

    // ── Load classes ─────────────────────────────────────
    async function loadAdminClasses() {
      showLoading(classesContainer);
      try {
        const classes = await getAllClasses();
        renderAdminClasses(classes);
      } catch (err) {
        classesContainer.innerHTML = `
          <div class="text-center py-5 text-danger">
            <p class="fw-medium mb-1">Hiba az órák betöltése során</p>
            <p class="small text-danger mb-0">${escapeHtml(err.message)}</p>
          </div>`;
      }
    }

    function renderAdminClasses(classes) {
      if (classes.length === 0) {
        classesContainer.innerHTML = `
          <div class="text-center text-muted py-5 px-3">
            <svg class="text-sage mb-3 opacity-50" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
            <p class="fw-medium text-secondary mb-1">Még nincsenek meghirdetett órák</p>
            <p class="small text-muted mb-0">Kattints az „Új óra meghirdetése" gombra</p>
          </div>`;
        return;
      }

      const today    = new Date().toISOString().split('T')[0];
      const upcoming = classes.filter(c => c.date >= today);
      const past     = classes.filter(c => c.date <  today);

      let html = '';

      if (upcoming.length > 0) {
        html += `<h2 class="h5 font-display fw-semibold mb-3" style="color:var(--sage-800)">Közelgő órák</h2>`;
        html += `<div class="mb-4">`;
        upcoming.sort((a,b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));
        upcoming.forEach(cls => { html += adminClassRow(cls); });
        html += `</div>`;
      }

      if (past.length > 0) {
        html += `
          <details class="mb-3">
            <summary class="h5 font-display fw-semibold text-muted mb-3 user-select-none" style="cursor:pointer">
              Korábbi órák (${past.length})
            </summary>
            <div class="opacity-75">`;
        past.forEach(cls => { html += adminClassRow(cls, true); });
        html += `</div></details>`;
      }

      classesContainer.innerHTML = html;

      // Bind events
      classesContainer.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const cls = classes.find(c => c.id === btn.dataset.id);
          if (cls) openModal(cls);
        });
      });

      classesContainer.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await showConfirm('Biztosan törölni szeretnéd ezt az órát? A kapcsolódó foglalások is törlődnek.');
          if (!ok) return;
          try {
            await deleteClass(btn.dataset.id);
            showToast('Óra sikeresen törölve.', 'info');
            loadAdminClasses();
          } catch (err) {
            showToast('Hiba a törlés során.', 'error');
          }
        });
      });

      classesContainer.querySelectorAll('.participants-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const cls = classes.find(c => c.id === btn.dataset.id);
          await showParticipants(cls);
        });
      });
    }

    function adminClassRow(cls, isPast = false) {
      const typeNames = { mat: 'Mat', reformer: 'Reformer', tower: 'Tower', prenatal: 'Kismama' };
      const badgeClass = `badge-${cls.type || 'default'}`;

      return `
        <div class="card border shadow-sm p-3 mb-2">
          <div class="d-flex flex-column flex-sm-row align-items-sm-center gap-2 gap-sm-3">
            <div class="flex-grow-1 min-w-0">
              <div class="d-flex align-items-center gap-2 mb-1">
                <span class="badge ${badgeClass}">${typeNames[cls.type] || escapeHtml(cls.type)}</span>
                <span class="small text-muted">${escapeHtml(cls.location || '')}</span>
              </div>
              <h3 class="fw-semibold text-dark text-truncate h6 mb-0">${escapeHtml(cls.title)}</h3>
              <p class="small text-muted mb-0 mt-1">
                ${formatDate(cls.date)} &middot; ${escapeHtml(cls.startTime)} &middot; ${cls.duration} perc
              </p>
            </div>

            <div class="d-flex align-items-center gap-2 flex-shrink-0 small">
              <button type="button" class="participants-btn btn btn-sm btn-sage-outline d-inline-flex align-items-center gap-1" data-id="${cls.id}">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                </svg>
                ${cls.currentBookings || 0}/${cls.maxCapacity}
              </button>
              ${!isPast ? `
                <button type="button" class="edit-btn btn btn-sm btn-link text-sage p-1" data-id="${cls.id}" title="Szerkesztés">
                  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                  </svg>
                </button>
                <button type="button" class="delete-btn btn btn-sm btn-link text-danger p-1" data-id="${cls.id}" title="Törlés">
                  <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                  </svg>
                </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    // ── Show participants ────────────────────────────
    async function showParticipants(cls) {
      participantsTitle.textContent = `${cls.title} – Résztvevők`;
      participantsList.innerHTML = `
        <div class="d-flex justify-content-center py-4">
          <div class="spinner-border spinner-sage" role="status" style="width:2rem;height:2rem;border-width:3px">
            <span class="visually-hidden">Betöltés...</span>
          </div>
        </div>`;
      participantsModal.classList.remove('hidden');

      try {
        const bookings = await getBookingsForClass(cls.id);
        if (bookings.length === 0) {
          participantsList.innerHTML = `
            <p class="text-center text-muted py-4 mb-0">Még senki sem jelentkezett erre az órára.</p>`;
          return;
        }

        participantsList.innerHTML = `
          <div class="small text-muted mb-3">${bookings.length} / ${cls.maxCapacity} fő</div>
          <ul class="list-unstyled mb-0">
            ${bookings.map((b, i) => `
              <li class="d-flex align-items-center gap-3 p-3 bg-light rounded-3 mb-2">
                <div class="rounded-circle bg-sage-light text-sage flex-shrink-0 d-flex align-items-center justify-content-center fw-bold small" style="width:2rem;height:2rem">
                  ${i + 1}
                </div>
                <div class="min-w-0">
                  <p class="fw-medium text-dark small mb-0">${escapeHtml(b.userName)}</p>
                  <p class="small text-muted mb-0">${escapeHtml(b.userEmail)}</p>
                </div>
              </li>
            `).join('')}
          </ul>
        `;
      } catch (err) {
        participantsList.innerHTML = `<p class="text-danger text-center py-4 mb-0">Hiba: ${escapeHtml(err.message)}</p>`;
      }
    }
  </script>
</body>
</html>
