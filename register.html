<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Regisztrálj a Balance Studio-ba és foglalj pilates órát online! Ingyenes fiók, egyszerű foglalás." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Regisztráció – Balance Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/theme.js"></script>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6b8a53" />
  <link rel="icon" href="img/logo.svg" type="image/svg+xml" />
</head>
<body class="auth-page d-flex align-items-center justify-content-center px-3 py-4">

  <div class="w-100 mx-auto" style="max-width: 28rem;">
    <div class="text-center mb-4 mb-md-5">
      <a href="index.html" class="text-decoration-none auth-logo d-inline-block">
        <img src="img/logo.svg" alt="Balance Studio" height="80">
      </a>
      <p class="mt-2 small mb-0" style="color:var(--sage-400)">Hozd létre fiókodat és foglalj órát</p>
    </div>

    <div class="card auth-card rounded-4">
      <div class="card-body p-4 p-md-5">
        <form id="register-form">
          <div class="mb-3">
            <label for="name" class="form-label">Teljes név</label>
            <input type="text" id="name" class="form-control" placeholder="Kovács Anna" required />
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">E-mail cím</label>
            <input type="email" id="email" class="form-control" placeholder="nev@example.com" required />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Jelszó</label>
            <div class="input-group">
              <input type="password" id="password" class="form-control" placeholder="Min. 8 karakter, nagy/kisbetű, szám" required minlength="8" />
              <button type="button" class="pw-toggle" tabindex="-1" aria-label="Jelszó megjelenítése">
                <svg class="pw-eye-open" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.01 9.96 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.01-9.964-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg class="pw-eye-closed hidden" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
            <div id="pw-strength" class="mt-2 hidden">
              <div class="d-flex gap-1 mb-1" role="presentation">
                <div class="flex-fill rounded-pill bg-body-secondary" style="height: 6px;" id="pw-bar-1"></div>
                <div class="flex-fill rounded-pill bg-body-secondary" style="height: 6px;" id="pw-bar-2"></div>
                <div class="flex-fill rounded-pill bg-body-secondary" style="height: 6px;" id="pw-bar-3"></div>
                <div class="flex-fill rounded-pill bg-body-secondary" style="height: 6px;" id="pw-bar-4"></div>
              </div>
              <ul id="pw-checks" class="list-unstyled mb-0 small"></ul>
            </div>
          </div>

          <div class="mb-3">
            <label for="password2" class="form-label">Jelszó megerősítése</label>
            <div class="input-group">
              <input type="password" id="password2" class="form-control" placeholder="••••••••" required minlength="8" />
              <button type="button" class="pw-toggle" tabindex="-1" aria-label="Jelszó megjelenítése">
                <svg class="pw-eye-open" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.01 9.96 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.01-9.964-7.178z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <svg class="pw-eye-closed hidden" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>

          <div class="mb-3">
            <label for="birthday" class="form-label">Születési dátum</label>
            <input type="date" id="birthday" class="form-control" required />
          </div>

          <div class="mb-4 form-check">
            <label class="form-check-label small text-muted" for="gdpr">
              Elfogadom az <a href="terms.html" class="text-sage">ÁSZF</a>-et és az <a href="privacy.html" class="text-sage">Adatvédelmi tájékoztatót</a>.
            </label>
          </div>

          <button type="submit" id="register-btn" class="btn btn-sage w-100 py-2">
            Regisztráció
          </button>

          <p id="error-msg" class="text-danger small text-center mt-3 mb-0 hidden"></p>
        </form>

        <div class="position-relative my-4">
          <hr style="border-color:var(--sage-200)">
          <span class="position-absolute top-50 start-50 translate-middle px-3 small" style="background:#fff;color:var(--sage-400)">vagy</span>
        </div>

        <button type="button" id="google-register-btn" class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Regisztráció Google fiókkal
        </button>

        <p class="text-center small mt-4 mb-0" style="color:var(--sage-400)">
          Már van fiókod?
          <a href="login.html" class="text-sage fw-semibold text-decoration-none">Jelentkezz be</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { registerUser, signInWithGoogle, handleGoogleRedirect, logoutUser } from './js/auth.js';
    import { auth, onAuthStateChanged } from './js/firebase-config.js';
    import { validatePassword, checkRateLimit, initCookieConsent } from './js/ui.js';
    initCookieConsent();

    // Handle Google redirect result (mobile sign-in)
    handleGoogleRedirect().then(() => {
      if (auth.currentUser) window.location.href = 'index.html';
    });

    let isRegistering = false;

    onAuthStateChanged(auth, (user) => {
      if (user && !isRegistering) window.location.href = 'index.html';
    });

    const form        = document.getElementById('register-form');
    const errorMsg    = document.getElementById('error-msg');
    const btn         = document.getElementById('register-btn');
    const pwInput     = document.getElementById('password');
    const pwStrength  = document.getElementById('pw-strength');
    const pwChecks    = document.getElementById('pw-checks');

    // ── Password visibility toggle ─────────────────────────
    document.querySelectorAll('.pw-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        btn.querySelector('.pw-eye-open').classList.toggle('hidden', isHidden);
        btn.querySelector('.pw-eye-closed').classList.toggle('hidden', !isHidden);
      });
    });

    // ── Real-time password strength meter
    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      if (!val) { pwStrength.classList.add('hidden'); return; }
      pwStrength.classList.remove('hidden');

      const result = validatePassword(val);
      const colors = ['bg-danger', 'bg-warning', 'bg-warning', 'bg-success'];
      const barColor = colors[Math.min(result.strength - 1, 3)] || 'bg-body-secondary';

      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById(`pw-bar-${i}`);
        bar.className = `flex-fill rounded-pill ${i <= result.strength ? barColor : 'bg-body-secondary'}`;
      }

      pwChecks.innerHTML = result.checks.map(c =>
        `<li class="small ${c.ok ? 'text-success' : 'text-muted'}">
          ${c.ok ? '&#10003;' : '&#10007;'} ${c.msg}
        </li>`
      ).join('');
    });

    // ── Registration submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      // Rate limit check
      const rl = checkRateLimit('register', 5, 60000);
      if (!rl.allowed) {
        errorMsg.textContent = rl.message;
        errorMsg.classList.remove('hidden');
        return;
      }

      const name      = document.getElementById('name').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = pwInput.value;
      const password2 = document.getElementById('password2').value;
      const birthday  = document.getElementById('birthday').value || null;

      // Password strength validation
      const pwResult = validatePassword(password);
      if (!pwResult.valid) {
        errorMsg.textContent = 'A jelszó nem elég erős: ' + pwResult.errors.join(', ');
        errorMsg.classList.remove('hidden');
        return;
      }

      if (password !== password2) {
        errorMsg.textContent = 'A két jelszó nem egyezik!';
        errorMsg.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Regisztráció...';
      isRegistering = true;

      try {
        await registerUser(name, email, password, birthday);
        await logoutUser();
        window.location.href = 'login.html?verified=pending';
      } catch (err) {
        console.error('Registration error:', err);
        isRegistering = false;
        btn.disabled = false;
        btn.textContent = 'Regisztráció';

        const messages = {
          'auth/email-already-in-use': 'Ez az e-mail cím már foglalt.',
          'auth/weak-password':        'A jelszó túl gyenge.',
          'auth/invalid-email':        'Érvénytelen e-mail cím formátum.',
          'auth/network-request-failed': 'Hálózati hiba. Ellenőrizd az internetkapcsolatod.',
          'auth/too-many-requests':    'Túl sok próbálkozás. Próbáld újra később.'
        };
        const code = err.code || '';
        errorMsg.textContent = messages[code] || err.message || 'Hiba történt a regisztráció során.';
        errorMsg.classList.remove('hidden');
      }
    });

    // ── Google Sign-In ───────────────────────────────────
    document.getElementById('google-register-btn').addEventListener('click', async () => {
      const gBtn = document.getElementById('google-register-btn');
      gBtn.disabled = true;
      errorMsg.classList.add('hidden');
      isRegistering = true;
      try {
        const user = await signInWithGoogle();
        if (!user) return; // redirect flow
        window.location.href = 'index.html';
      } catch (err) {
        isRegistering = false;
        if (err.code !== 'auth/popup-closed-by-user') {
          errorMsg.textContent = 'Google regisztráció sikertelen: ' + (err.message || 'Ismeretlen hiba.');
          errorMsg.classList.remove('hidden');
        }
      } finally {
        gBtn.disabled = false;
      }
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
